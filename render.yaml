services:
  - type: web
    name: wollonet
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn wollo_search.wsgi --log-file -"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
