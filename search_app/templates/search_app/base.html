<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}WolloNet Search{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/wollonet.css' %}" />
  <!-- Apply saved theme before page renders to avoid flash -->
  <script>
    (function() {
      const t = localStorage.getItem('wn-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <!-- Theme toggle button (fixed top-right on every page) -->
  <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle dark/light mode" title="Toggle theme">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </button>

  {% block body %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% load static %}
  <script src="{% static 'js/wollonet.js' %}"></script>
</body>
</html>
